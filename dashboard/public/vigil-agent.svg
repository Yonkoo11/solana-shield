<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a0b10"/>
  <!-- Grid shield shape -->
  <g transform="translate(120, 80)">
    <!-- Row 1 -->
    <rect x="20" y="0" width="30" height="30" rx="3" fill="#10b981" opacity="0.9"/>
    <rect x="60" y="0" width="30" height="30" rx="3" fill="#2a2f3a"/>
    <rect x="100" y="0" width="30" height="30" rx="3" fill="#10b981" opacity="0.9"/>
    <!-- Row 2 -->
    <rect x="0" y="40" width="30" height="30" rx="3" fill="#10b981" opacity="0.7"/>
    <rect x="40" y="40" width="30" height="30" rx="3" fill="#dc2626" opacity="0.9"/>
    <rect x="80" y="40" width="30" height="30" rx="3" fill="#10b981" opacity="0.9"/>
    <rect x="120" y="40" width="30" height="30" rx="3" fill="#10b981" opacity="0.7"/>
    <!-- Row 3 -->
    <rect x="0" y="80" width="30" height="30" rx="3" fill="#10b981" opacity="0.9"/>
    <rect x="40" y="80" width="30" height="30" rx="3" fill="#10b981" opacity="0.9"/>
    <rect x="80" y="80" width="30" height="30" rx="3" fill="#dc2626" opacity="0.9"/>
    <rect x="120" y="80" width="30" height="30" rx="3" fill="#10b981" opacity="0.9"/>
    <!-- Row 4 (narrower - shield taper) -->
    <rect x="20" y="120" width="30" height="30" rx="3" fill="#10b981" opacity="0.7"/>
    <rect x="60" y="120" width="30" height="30" rx="3" fill="#10b981" opacity="0.9"/>
    <rect x="100" y="120" width="30" height="30" rx="3" fill="#10b981" opacity="0.7"/>
    <!-- Row 5 (point) -->
    <rect x="40" y="160" width="30" height="30" rx="3" fill="#10b981" opacity="0.6"/>
    <rect x="80" y="160" width="30" height="30" rx="3" fill="#10b981" opacity="0.6"/>
    <!-- Row 6 (tip) -->
    <rect x="60" y="200" width="30" height="30" rx="3" fill="#10b981" opacity="0.4"/>
    <!-- Glow effects on red cells -->
    <circle cx="55" cy="55" r="20" fill="#dc2626" opacity="0.12"/>
    <circle cx="95" cy="95" r="20" fill="#dc2626" opacity="0.12"/>
  </g>
  <!-- Text -->
  <text x="200" y="360" text-anchor="middle" font-family="monospace" font-size="28" font-weight="700" letter-spacing="8" fill="#c8cdd5">VIGIL</text>
</svg>
