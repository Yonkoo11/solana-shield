<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 640px;
    background: #0a0b10;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
    position: relative; overflow: hidden;
  }

  /* Subtle grain */
  body::before {
    content: ''; position: absolute; inset: 0; opacity: 0.03;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  }

  /* Radar circles */
  .radar { position: absolute; border-radius: 50%; border: 1px solid rgba(16, 185, 129, 0.04); }
  .r1 { width: 800px; height: 800px; top: -80px; left: 400px; }
  .r2 { width: 600px; height: 600px; top: 20px; left: 500px; }
  .r3 { width: 400px; height: 400px; top: 120px; left: 600px; }
  .r4 { width: 200px; height: 200px; top: 220px; left: 700px; }

  .content {
    display: flex; align-items: center; gap: 80px;
    position: relative; z-index: 1;
  }

  /* Shield grid */
  .shield {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .shield-row { display: flex; gap: 6px; }
  .cell {
    width: 28px; height: 28px; border-radius: 3px;
    transition: all 0.3s;
  }
  .cell.green { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.3); }
  .cell.red { background: #dc2626; box-shadow: 0 0 12px rgba(220,38,38,0.4); }
  .cell.dim { background: #1a1f2a; }
  .cell.empty { background: transparent; }

  /* Text side */
  .text-side { display: flex; flex-direction: column; gap: 16px; }
  .brand {
    font-size: 48px; font-weight: 700; letter-spacing: 12px;
    color: #c8cdd5;
  }
  .tagline {
    font-size: 16px; color: #6b7280; letter-spacing: 2px;
    line-height: 1.6;
  }
  .stats {
    display: flex; gap: 32px; margin-top: 8px;
  }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-val.green { color: #10b981; }
  .stat-val.red { color: #dc2626; }
  .stat-val.amber { color: #d97706; }
  .stat-label { font-size: 10px; color: #3d4450; letter-spacing: 1.5px; text-transform: uppercase; }

  /* Subtle scan line */
  .scanline {
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: linear-gradient(90deg, transparent, rgba(16,185,129,0.15), transparent);
    animation: scan 3s ease-in-out infinite;
  }
  @keyframes scan { 0%{top:0} 50%{top:100%} 100%{top:0} }
</style>
</head>
<body>
  <div class="scanline"></div>
  <div class="radar r1"></div>
  <div class="radar r2"></div>
  <div class="radar r3"></div>
  <div class="radar r4"></div>

  <div class="content">
    <div class="shield">
      <!-- Row 1: 3 cells -->
      <div class="shield-row">
        <div class="cell empty"></div>
        <div class="cell green"></div>
        <div class="cell dim"></div>
        <div class="cell green"></div>
        <div class="cell empty"></div>
      </div>
      <!-- Row 2: 5 cells -->
      <div class="shield-row">
        <div class="cell green"></div>
        <div class="cell red"></div>
        <div class="cell green"></div>
        <div class="cell green"></div>
        <div class="cell green"></div>
      </div>
      <!-- Row 3: 5 cells -->
      <div class="shield-row">
        <div class="cell green"></div>
        <div class="cell green"></div>
        <div class="cell green"></div>
        <div class="cell red"></div>
        <div class="cell green"></div>
      </div>
      <!-- Row 4: 3 cells -->
      <div class="shield-row">
        <div class="cell empty"></div>
        <div class="cell green"></div>
        <div class="cell green"></div>
        <div class="cell green"></div>
        <div class="cell empty"></div>
      </div>
      <!-- Row 5: 3 cells -->
      <div class="shield-row">
        <div class="cell empty"></div>
        <div class="cell empty"></div>
        <div class="cell green"></div>
        <div class="cell empty"></div>
        <div class="cell empty"></div>
      </div>
    </div>

    <div class="text-side">
      <div class="brand">VIGIL</div>
      <div class="tagline">
        ON-CHAIN GUARDIAN PROTOCOL FOR SOLANA<br>
        DETECT EXPLOITS. PAUSE PROTOCOLS. PROTECT TVL.
      </div>
      <div class="stats">
        <div class="stat-item">
          <span class="stat-val green">5</span>
          <span class="stat-label">Invariant Checks</span>
        </div>
        <div class="stat-item">
          <span class="stat-val green">&lt;10s</span>
          <span class="stat-label">Detection</span>
        </div>
        <div class="stat-item">
          <span class="stat-val red">$285M</span>
          <span class="stat-label">Drift Loss</span>
        </div>
        <div class="stat-item">
          <span class="stat-val amber">30min</span>
          <span class="stat-label">Manual Detection</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
